<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:      #0d0b09;
    --paper:    #f4efe8;
    --warm-bg:  #171412;
    --surface:  #1f1b17;
    --border:   #2a2520;
    --muted:    #78716c;
    --quiet:    #57534e;
    --accent:   #d4a574;
    --accent-dim: #a88b6a;
    --font-heading: 'DM Serif Display', Georgia, serif;
    --font-ui:      'DM Sans', system-ui, sans-serif;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Subtle warm vignette */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(212,165,116,0.03) 0%, transparent 55%);
    pointer-events: none; z-index: 0;
  }

  /* ── Player ── */
  .player {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    padding: 48px 36px 36px;
    display: flex; flex-direction: column; align-items: center;
    gap: 32px;
    animation: enter 0.6s var(--ease-out) both;
  }
  @keyframes enter { from { opacity: 0; transform: translateY(8px); } }

  /* ── Cover ── */
  .cover-frame {
    position: relative;
    width: 260px; height: 260px;
    flex-shrink: 0;
  }
  .cover-silhouette {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    background: var(--surface);
    opacity: 0;
    transition: opacity 0.6s var(--ease-out), transform 0.6s var(--ease-out);
    transform: scale(0.94);
  }
  .cover-silhouette.visible { opacity: 1; transform: scale(1); }
  .cover-silhouette.rotating { animation: rotateDisc 12s linear infinite; }
  @keyframes rotateDisc { to { transform: rotate(360deg); } }

  /* Tiny spindle dot */
  .spindle {
    position: absolute; z-index: 10;
    top: 50%; left: 50%;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--ink);
    border: 1.5px solid var(--border);
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .spindle.visible { opacity: 1; }

  .cover-area {
    position: relative; z-index: 5;
    width: 100%; height: 100%;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    overflow: hidden;
    background: var(--surface);
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    transition: box-shadow 0.4s var(--ease-out), transform 0.3s var(--ease-out);
  }
  .cover-area:hover { transform: scale(1.015); }
  .cover-area.playing { box-shadow: 0 4px 32px rgba(212,165,116,0.12); }

  .cover-area img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    animation: revealImg 0.5s var(--ease-out);
  }
  @keyframes revealImg { from { opacity: 0; transform: scale(1.03); } }

  .cover-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    pointer-events: none; color: var(--quiet);
    transition: opacity 0.3s;
  }
  .cover-placeholder .icon { font-size: 40px; opacity: 0.45; }
  .cover-placeholder .hint {
    font-family: var(--font-ui); font-size: 10.5px;
    letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.5;
  }

  /* ── Meta ── */
  .meta { text-align: center; width: 100%; }
  .title {
    font-family: var(--font-heading);
    font-size: 28px; font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.25;
    color: var(--paper);
    animation: fadeUp 0.5s 0.05s var(--ease-out) both;
  }
  .subtitle {
    font-family: var(--font-ui); font-size: 12px; font-weight: 400;
    color: var(--muted); margin-top: 6px;
    letter-spacing: 0.03em;
    animation: fadeUp 0.5s 0.1s var(--ease-out) both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } }

  /* ── Timeline ── */
  .timeline {
    width: 100%; display: flex; align-items: center; gap: 10px;
    animation: fadeUp 0.5s 0.15s var(--ease-out) both;
  }
  .t { font-family: var(--font-ui); font-size: 10.5px; font-weight: 400;
       font-variant-numeric: tabular-nums; color: var(--quiet);
       min-width: 38px; letter-spacing: 0.04em; }
  .t.current { text-align: right; }
  .progress-bar {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 2px; background: var(--border); border-radius: 1px;
    cursor: pointer; outline: none;
  }
  .progress-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    background: var(--paper); border-radius: 50%;
    cursor: pointer; opacity: 0;
    transition: opacity 0.2s, transform 0.15s;
  }
  .progress-bar:hover::-webkit-slider-thumb,
  .progress-bar:active::-webkit-slider-thumb { opacity: 1; }
  .progress-bar::-webkit-slider-thumb:hover { transform: scale(1.4); }
  .progress-bar::-moz-range-thumb {
    width: 10px; height: 10px; background: var(--paper);
    border: none; border-radius: 50%; cursor: pointer;
  }

  /* ── Controls ── */
  .controls {
    display: flex; align-items: center; gap: 32px;
    animation: fadeUp 0.5s 0.2s var(--ease-out) both;
  }
  .btn-play {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--paper);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s var(--ease-out);
  }
  .btn-play:hover { border-color: var(--accent-dim); color: var(--accent); }
  .btn-play:active { transform: scale(0.93); }
  .btn-play:disabled { opacity: 0.2; cursor: not-allowed; }
  .btn-play:disabled:hover { border-color: var(--border); color: var(--paper); }

  /* ── Bottom bar ── */
  .bottom-bar {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 20px;
    animation: fadeUp 0.5s 0.25s var(--ease-out) both;
  }
  .volume-group { display: flex; align-items: center; gap: 8px; }
  .volume-group .icon {
    font-size: 14px; color: var(--muted); cursor: default; user-select: none;
  }
  .volume-slider {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 2px;
    background: var(--border); border-radius: 1px; cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 8px; height: 8px;
    background: var(--muted); border-radius: 50%; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .volume-slider::-webkit-slider-thumb:hover { background: var(--paper); transform: scale(1.3); }
  .volume-slider::-moz-range-thumb {
    width: 8px; height: 8px; background: var(--muted);
    border: none; border-radius: 50%; cursor: pointer;
  }

  .sep { width: 1px; height: 14px; background: var(--border); border-radius: 1px; }

  .loop-btn {
    background: none; border: none;
    color: var(--quiet); font-family: var(--font-ui);
    font-size: 11px; cursor: pointer; letter-spacing: 0.05em;
    padding: 4px 0; transition: color 0.25s;
  }
  .loop-btn:hover { color: var(--muted); }
  .loop-btn.active { color: var(--accent); }

  /* ── Lyrics ── */
  .lyrics-toggle {
    background: none; border: none;
    color: var(--quiet); font-family: var(--font-ui);
    font-size: 11px; cursor: pointer; letter-spacing: 0.05em;
    padding: 2px 0; transition: color 0.25s;
  }
  .lyrics-toggle:hover { color: var(--muted); }
  .lyrics-toggle.active { color: var(--accent-dim); }

  .lyrics-panel {
    width: 100%; max-height: 0; overflow: hidden;
    transition: max-height 0.5s var(--ease-in-out);
  }
  .lyrics-panel.open { max-height: 220px; }
  .lyrics-inner {
    padding: 0 8px; max-height: 220px; overflow-y: auto;
    scroll-behavior: smooth;
    font-family: var(--font-ui); font-size: 13px;
    line-height: 2.3; text-align: center; color: var(--quiet);
    -webkit-mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
    mask-image: linear-gradient(to bottom, black 65%, transparent 100%);
  }
  .lyrics-inner .line { transition: all 0.4s var(--ease-out); }
  .lyrics-inner .line.active {
    color: var(--accent-dim); font-weight: 500;
  }

  /* ── Drop zone ── */
  .drop-zone {
    width: 100%; padding: 24px 16px;
    border: 1px dashed var(--border);
    border-radius: 4px;
    text-align: center; cursor: pointer;
    font-family: var(--font-ui); font-size: 12px;
    color: var(--quiet); letter-spacing: 0.03em;
    transition: all 0.3s var(--ease-out);
    animation: fadeUp 0.5s 0.3s var(--ease-out) both;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent-dim); color: var(--muted);
  }
  .drop-zone.hidden { display: none; }
  .drop-zone small { opacity: 0.5; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--surface); color: var(--paper);
    padding: 10px 24px; border-radius: 6px;
    border: 1px solid var(--border);
    font-family: var(--font-ui); font-size: 12px; letter-spacing: 0.02em;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s var(--ease-out);
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  .file-input-hidden { display: none; }

  @media (max-width: 440px) {
    .player { padding: 32px 20px 24px; gap: 24px; }
    .cover-frame { width: 220px; height: 220px; }
    .title { font-size: 24px; }
    .btn-play { width: 50px; height: 50px; font-size: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0s !important; transition-duration: 0s !important; }
  }
</style>
</head>
<body>

<div class="player">

  <!-- Cover -->
  <div class="cover-frame">
    <div class="cover-silhouette" id="vinylDisc"></div>
    <div class="spindle" id="spindle"></div>
    <div class="cover-area" id="coverArea" title="点击或拖放图片添加封面">
      <div class="cover-placeholder" id="coverPlaceholder">
        <span class="icon">♫</span>
        <span class="hint">add cover</span>
      </div>
      <img id="coverImg" src="" alt="" style="display:none">
    </div>
    <input type="file" class="file-input-hidden" id="coverFileInput" accept="image/*">
  </div>

  <!-- Meta -->
  <div class="meta">
    <div class="title" id="setName">drop audio files</div>
    <div class="subtitle" id="trackName">no tracks loaded</div>
  </div>

  <!-- Lyrics -->
  <div style="width:100%;display:flex;justify-content:center;">
    <button class="lyrics-toggle" id="lyricsBtn" style="display:none">lyrics</button>
  </div>
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-inner" id="lyricsInner"></div>
  </div>

  <!-- Timeline -->
  <div class="timeline">
    <span class="t current" id="timeCurrent">0:00</span>
    <input type="range" class="progress-bar" id="progressBar" min="0" max="100" value="0" disabled>
    <span class="t total" id="timeTotal">0:00</span>
  </div>

  <!-- Play -->
  <div class="controls">
    <button class="btn-play" id="btnPlay" disabled>▶</button>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="volume-group">
      <span class="icon">vol</span>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
    </div>
    <span class="sep"></span>
    <button class="loop-btn" id="btnLoop">loop off</button>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone" title="拖放或点击导入音频">
    drop audio files here<br><small>or click to browse  ·  mp3 wav ogg flac</small>
  </div>
  <input type="file" class="file-input-hidden" id="audioFileInput" accept="audio/*,.lrc" multiple>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
<script>
/* ── Env ── */
if (typeof FileReader === 'undefined') {
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d0b09;color:#f4efe8;font-family:system-ui,sans-serif;"><div style="text-align:center;padding:32px;"><p style="font-size:24px;">Your browser is not supported.</p><p style="color:#78716c;margin-top:8px;">Please use a recent version of Chrome, Firefox, Edge, or Safari.</p></div></div>`;
  throw new Error('No FileReader');
}

/* ── Store ── */
const Store = (() => {
  let ok = false; const P = 'msp:';
  try { const k = P+'t'; localStorage.setItem(k,'1'); localStorage.removeItem(k); ok = true; } catch(_){}
  return {
    get(k) { if(!ok) return ({volume:0.8,loop:false})[k]; try { const r=localStorage.getItem(P+k); return r!=null ? JSON.parse(r) : ({volume:0.8,loop:false})[k]; } catch(_){ return ({volume:0.8,loop:false})[k]; } },
    set(k,v) { if(!ok) return; try { localStorage.setItem(P+k, JSON.stringify(v)); } catch(_){} }
  };
})();

/* ── AudioEngine ── */
const AudioEngine = (() => {
  const a = new Audio(); const ls = {}; let cf = null;
  function on(n,fn) { if(!ls[n]) ls[n]=[]; ls[n].push(fn); }
  function em(n,d) { (ls[n]||[]).forEach(fn=>fn(d)); }
  a.addEventListener('timeupdate', ()=>{ if(a.duration&&isFinite(a.duration)) em('t',{ct:a.currentTime,d:a.duration}); });
  a.addEventListener('ended', ()=>em('end'));
  a.addEventListener('loadedmetadata', ()=>em('meta',{d:a.duration}));
  a.addEventListener('error', ()=>em('err',{f:cf}));
  a.addEventListener('play', ()=>em('play'));
  a.addEventListener('pause', ()=>em('pause'));
  return {
    load(f) { if(cf&&a.src&&a.src.startsWith('blob:')) URL.revokeObjectURL(a.src); cf=f; a.src=URL.createObjectURL(f); a.load(); },
    play(){ const p=a.play(); if(p)p.catch(()=>{}); },
    pause(){ a.pause(); },
    seek(s){ if(isFinite(s)) a.currentTime=s; },
    vol(v){ a.volume=Math.max(0,Math.min(1,v)); },
    loop(b){ a.loop=b; },
    ct(){ return a.currentTime; },
    dur(){ return a.duration||0; },
    paused(){ return a.paused; },
    on,
    destroy(){ a.pause(); if(a.src&&a.src.startsWith('blob:')) URL.revokeObjectURL(a.src); }
  };
})();

/* ── Playlist ── */
const Playlist = (() => {
  let files=[]; let idx=-1;
  const lrcMap=new Map();
  function add(nf) {
    const arr=Array.from(nf);
    if(!arr.length) return {added:0,skipped:0,total:files.length};
    const lrcs=arr.filter(f=>/\.lrc$/i.test(f.name));
    const audios=arr.filter(f=>f.type.startsWith('audio/')||/\.(mp3|wav|ogg|flac|m4a|aac|wma|opus|webm)$/i.test(f.name));
    lrcs.forEach(f=>{ const r=new FileReader(); r.onload=()=>lrcMap.set(f.name.replace(/\.lrc$/i,''),r.result); r.readAsText(f); });
    const skipped=arr.length-audios.length-lrcs.length;
    files.push(...audios); if(idx===-1&&files.length>0) idx=0;
    return {added:audios.length,skipped,total:files.length};
  }
  function cur(){ return idx>=0?files[idx]:null; }
  function nxt(){ if(!files.length) return null; idx=(idx+1)%files.length; return files[idx]; }
  function gi(){ return idx; }
  function cnt(){ return files.length; }
  function lrcFor(f) {
    if(!f) return null;
    const base=f.name.replace(/\.(mp3|wav|ogg|flac|m4a|aac|wma|opus|webm)$/i,'');
    return lrcMap.get(base)||lrcMap.get(f.name)||null;
  }
  return {add,cur,nxt,gi,cnt,lrcFor};
})();

/* ── CoverManager ── */
const CoverManager = (() => {
  let dataURL=null; const ls={};
  function on(n,fn){ if(!ls[n]) ls[n]=[]; ls[n].push(fn); }
  function em(n,d){ (ls[n]||[]).forEach(fn=>fn(d)); }
  function set(f) {
    if(!f||!f.type.startsWith('image/')) { em('err',{m:'not a valid image file'}); return; }
    const r=new FileReader();
    r.onload=()=>{ dataURL=r.result; em('ch',{url:dataURL}); };
    r.onerror=()=>em('err',{m:'failed to read image'});
    r.readAsDataURL(f);
  }
  return {set,cur:()=>dataURL,on};
})();

/* ── Lyrics ── */
const Lyrics = (() => {
  let parsed=[], hasTS=false; const ls={};
  function on(n,fn){ if(!ls[n]) ls[n]=[]; ls[n].push(fn); }
  function em(n,d){ (ls[n]||[]).forEach(fn=>fn(d)); }
  function parse(text) {
    const lines=[]; const re=/^\[(\d{2}):(\d{2})(?:[.:](\d{2,3}))?\](.*)$/;
    for(const raw of text.split(/\r?\n/)) {
      const m=raw.match(re);
      if(m) { let ms=m[3]?parseInt(m[3]):0; if(ms<100) ms*=10; lines.push({t:parseInt(m[1])*60+parseInt(m[2])+ms/1000,txt:m[4].trim()}); }
      else { const t=raw.trim(); if(t&&!t.startsWith('[')) lines.push({t:-1,txt:t}); }
    }
    parsed=lines; hasTS=lines.some(l=>l.t>=0); em('ch',{lines:parsed,hasTS});
  }
  function plain(text) {
    parsed=text.split(/\r?\n/).filter(t=>t.trim()).map(t=>({t:-1,txt:t.trim()}));
    hasTS=false; em('ch',{lines:parsed,hasTS:false});
  }
  function active(ct) {
    if(!hasTS||!parsed.length) return -1;
    let a=-1; for(let i=0;i<parsed.length;i++) { if(parsed[i].t>=0&&parsed[i].t<=ct) a=i; }
    return a;
  }
  async function fromAudio(file) {
    if(typeof jsmediatags==='undefined') return false;
    return new Promise(res=>{
      jsmediatags.read(file,{
        onSuccess: (tag)=>{
          const t=tag.tags;
          if(t.lyrics&&typeof t.lyrics==='string') { plain(t.lyrics); res(true); }
          else if(t.lyrics&&t.lyrics.lyrics) { plain(t.lyrics.lyrics); res(true); }
          else if(t.unsynchronisedLyrics&&typeof t.unsynchronisedLyrics==='string') { plain(t.unsynchronisedLyrics); res(true); }
          else if(t.unsynchronisedLyrics&&t.unsynchronisedLyrics.lyrics) { plain(t.unsynchronisedLyrics.lyrics); res(true); }
          else res(false);
        },
        onError: ()=>res(false)
      });
    });
  }
  function clear() { parsed=[]; hasTS=false; em('ch',{lines:[],hasTS:false}); }
  return {parse,plain,active,fromAudio,clear,isEmpty:()=>parsed.length===0,lines:()=>parsed,on};
})();

/* ── UI ── */
(function() {
  const coverArea = document.getElementById('coverArea');
  const coverPlaceholder = document.getElementById('coverPlaceholder');
  const coverImg = document.getElementById('coverImg');
  const coverFileInput = document.getElementById('coverFileInput');
  const vinylDisc = document.getElementById('vinylDisc');
  const spindle = document.getElementById('spindle');
  const setName = document.getElementById('setName');
  const trackName = document.getElementById('trackName');
  const lyricsBtn = document.getElementById('lyricsBtn');
  const lyricsPanel = document.getElementById('lyricsPanel');
  const lyricsInner = document.getElementById('lyricsInner');
  const progressBar = document.getElementById('progressBar');
  const timeCurrent = document.getElementById('timeCurrent');
  const timeTotal = document.getElementById('timeTotal');
  const btnPlay = document.getElementById('btnPlay');
  const volumeSlider = document.getElementById('volumeSlider');
  const btnLoop = document.getElementById('btnLoop');
  const dropZone = document.getElementById('dropZone');
  const audioFileInput = document.getElementById('audioFileInput');
  const toast = document.getElementById('toast');

  let toastTimer, isSeeking=false, lyricsVisible=false;

  function fmt(s) {
    if(!isFinite(s)||s<0) return '0:00';
    return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
  }
  function toast_(msg) {
    toast.textContent=msg; toast.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('show'),2500);
  }

  function updateTrackDisplay() {
    const f=Playlist.cur();
    trackName.textContent = f ? `${Playlist.gi()+1} / ${Playlist.cnt()}  ·  ${f.name}` : 'no tracks loaded';
    setName.textContent = Playlist.cnt()>0 ? `${Playlist.cnt()} tracks` : 'drop audio files';
  }
  function updatePlayBtn() {
    if(Playlist.cnt()===0) { btnPlay.disabled=true; btnPlay.textContent='▶'; return; }
    btnPlay.disabled=false;
    btnPlay.textContent = AudioEngine.paused() ? '▶' : '⏸';
  }

  function setVinyl(on, hasCover) {
    if(hasCover) vinylDisc.classList.add('visible'), spindle.classList.add('visible');
    if(on&&hasCover) vinylDisc.classList.add('rotating');
    else vinylDisc.classList.remove('rotating');
  }
  AudioEngine.on('play', ()=>{ setVinyl(true,!!CoverManager.cur()); coverArea.classList.add('playing'); btnPlay.textContent='⏸'; });
  AudioEngine.on('pause', ()=>{ setVinyl(false,!!CoverManager.cur()); coverArea.classList.remove('playing'); btnPlay.textContent='▶'; });

  /* restore */
  const sv=Store.get('volume'), sl=Store.get('loop');
  AudioEngine.vol(sv); volumeSlider.value=Math.round(sv*100);
  let loopActive=sl; AudioEngine.loop(sl);
  btnLoop.classList.toggle('active',loopActive);
  btnLoop.textContent=loopActive?'loop on':'loop off';

  /* cover */
  coverArea.addEventListener('click',()=>coverFileInput.click());
  ['dragover','dragenter'].forEach(ev=>coverArea.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); }));
  coverArea.addEventListener('drop',e=>{ e.preventDefault(); const f=e.dataTransfer.files[0]; if(f) CoverManager.set(f); });
  coverFileInput.addEventListener('change',()=>{ const f=coverFileInput.files[0]; if(f) CoverManager.set(f); coverFileInput.value=''; });
  CoverManager.on('ch',({url})=>{ coverImg.src=url; coverImg.style.display='block'; coverPlaceholder.style.display='none'; vinylDisc.classList.add('visible'); spindle.classList.add('visible'); if(!AudioEngine.paused()) vinylDisc.classList.add('rotating'); });
  CoverManager.on('err',({m})=>toast_(m));

  /* import */
  function importFiles(fl) {
    if(!fl||!fl.length) return;
    const r=Playlist.add(fl);
    if(r.added===0) { toast_('no supported audio formats found'); return; }
    if(r.skipped>0) toast_(`added ${r.added}, skipped ${r.skipped} non-audio files`);
    if(r.added>0&&r.total===r.added) loadTrack();
    updateTrackDisplay(); updatePlayBtn();
    dropZone.classList.toggle('hidden',Playlist.cnt()>0);
  }
  async function loadTrack() {
    const f=Playlist.cur(); if(!f) return;
    AudioEngine.load(f); updateTrackDisplay(); updatePlayBtn();
    Lyrics.clear(); lyricsBtn.style.display='none'; lyricsPanel.classList.remove('open'); lyricsVisible=false;
    const lrc=Playlist.lrcFor(f);
    if(lrc) { Lyrics.parse(lrc); showLyrics(); }
    else if(typeof jsmediatags!=='undefined') { const found=await Lyrics.fromAudio(f); if(found) showLyrics(); }
    renderLyrics();
  }
  function showLyrics() { if(!Lyrics.isEmpty()) lyricsBtn.style.display='inline-block'; }
  function renderLyrics(activeIdx=-1) {
    const lines=Lyrics.lines(); if(!lines.length) { lyricsInner.innerHTML=''; return; }
    lyricsInner.innerHTML=lines.map((l,i)=>{
      let cls='line'; if(i===activeIdx) cls+=' active'; if(!l.txt) cls+=' empty';
      return `<div class="${cls}">${l.txt||'&nbsp;'}</div>`;
    }).join('');
    if(activeIdx>=0) { const el=lyricsInner.children[activeIdx]; if(el) el.scrollIntoView({block:'center',behavior:'smooth'}); }
  }
  lyricsBtn.addEventListener('click',()=>{
    lyricsVisible=!lyricsVisible; lyricsPanel.classList.toggle('open',lyricsVisible);
    lyricsBtn.classList.toggle('active',lyricsVisible);
    renderLyrics();
  });

  /* drop zone */
  dropZone.addEventListener('click',()=>audioFileInput.click());
  let dzC=0;
  dropZone.addEventListener('dragenter',e=>{ e.preventDefault(); dzC++; dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave',()=>{ dzC--; if(dzC===0) dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop',e=>{ e.preventDefault(); e.stopPropagation(); dzC=0; dropZone.classList.remove('drag-over'); importFiles(e.dataTransfer.files); });
  audioFileInput.addEventListener('change',()=>{ importFiles(audioFileInput.files); audioFileInput.value=''; });

  /* play/pause */
  btnPlay.addEventListener('click',()=>{ if(Playlist.cnt()===0) return; AudioEngine.paused()?AudioEngine.play():AudioEngine.pause(); updatePlayBtn(); });

  /* progress */
  progressBar.addEventListener('input',()=>{ isSeeking=true; const d=AudioEngine.dur(); if(d>0) timeCurrent.textContent=fmt((progressBar.value/100)*d); });
  progressBar.addEventListener('change',()=>{ const d=AudioEngine.dur(); if(d>0) AudioEngine.seek((progressBar.value/100)*d); isSeeking=false; });
  AudioEngine.on('t',({ct,d})=>{ if(!isSeeking&&d>0) { progressBar.value=(ct/d)*100; timeCurrent.textContent=fmt(ct); if(lyricsVisible) { const idx=Lyrics.active(ct); renderLyrics(idx); } } });
  AudioEngine.on('meta',({d})=>{ progressBar.disabled=false; progressBar.value=0; timeTotal.textContent=fmt(d); timeCurrent.textContent='0:00'; updatePlayBtn(); });

  /* track nav */
  let consErr=0;
  AudioEngine.on('end',()=>{ consErr=0; Playlist.nxt(); loadTrack(); AudioEngine.play(); });
  AudioEngine.on('meta',()=>{ consErr=0; });
  AudioEngine.on('err',({f})=>{ consErr++; if(consErr>=Playlist.cnt()) { toast_('all tracks failed to play'); consErr=0; return; } toast_(`playback error: ${f?f.name:'unknown'}`); Playlist.nxt(); loadTrack(); AudioEngine.play(); });

  /* volume */
  volumeSlider.addEventListener('input',()=>{ const v=volumeSlider.value/100; AudioEngine.vol(v); Store.set('volume',v); });

  /* loop */
  btnLoop.addEventListener('click',()=>{ loopActive=!loopActive; AudioEngine.loop(loopActive); Store.set('loop',loopActive); btnLoop.classList.toggle('active',loopActive); btnLoop.textContent=loopActive?'loop on':'loop off'; });

  /* global dnd */
  document.addEventListener('dragover',e=>{ e.preventDefault(); });
  document.addEventListener('drop',e=>{ e.preventDefault(); if(coverArea.contains(e.target)) return; const files=e.dataTransfer.files; if(files.length>0) importFiles(files); });
})();
</script>
</body>
</html>
