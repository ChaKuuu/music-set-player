<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Set Player — Amethyst Lounge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #08060f;
    --bg-card: rgba(22, 18, 36, 0.75);
    --glass-border: rgba(167, 139, 250, 0.12);
    --glass-highlight: rgba(255, 255, 255, 0.03);
    --accent: #a78bfa;
    --accent-soft: #c4b5fd;
    --accent-glow: rgba(167, 139, 250, 0.35);
    --gold: #d4a574;
    --gold-subtle: rgba(212, 165, 116, 0.2);
    --text: #f0edf6;
    --text-dim: #8b86a0;
    --text-quiet: #5e5a72;
    --danger: #f87171;
    --radius-xl: 20px;
    --radius-lg: 14px;
    --radius-md: 10px;
    --radius-sm: 6px;
    --font-display: 'Syne', serif;
    --font-body: 'Outfit', system-ui, sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 30% 70%, rgba(167, 139, 250, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse 30% 25% at 70% 20%, rgba(212, 165, 116, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Noise texture ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Player wrapper ── */
  .player {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 36px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    background: var(--bg-card);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-xl);
    box-shadow:
      0 0 80px rgba(167, 139, 250, 0.06),
      0 8px 32px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 var(--glass-highlight);
    animation: cardEnter 0.7s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Cover section ── */
  .cover-wrapper {
    position: relative;
    width: 260px; height: 260px;
    flex-shrink: 0;
  }

  /* Vinyl disc behind cover */
  .vinyl-disc {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: radial-gradient(circle at center,
      #1a1a1a 0%, #1a1a1a 12%,
      #222 12.5%, #111 13%,
      #111 25%, #1a1a1a 25.5%,
      #1a1a1a 38%, #111 38.5%,
      #111 51%, #1a1a1a 51.5%,
      #1a1a1a 64%, #111 64.5%,
      #111 77%, #1a1a1a 77.5%,
      #1a1a1a 90%, #111 90.5%,
      #111 100%);
    opacity: 0;
    transform: scale(0.92);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .vinyl-disc.visible { opacity: 0.55; transform: scale(1); }
  .vinyl-disc.spinning { animation: spin 8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .cover-area {
    position: relative;
    z-index: 2;
    width: 100%; height: 100%;
    border-radius: var(--radius-lg);
    background: rgba(255,255,255,0.02);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 0 0 0 var(--accent-glow);
    transition: box-shadow 0.6s ease, transform 0.3s ease;
  }
  .cover-area:hover { transform: scale(1.02); }
  .cover-area.playing { animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 24px var(--accent-glow); }
    50%      { box-shadow: 0 0 48px rgba(167, 139, 250, 0.55); }
  }
  .cover-area img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    animation: imgReveal 0.5s ease;
  }
  @keyframes imgReveal { from { opacity: 0; transform: scale(1.04); } }

  .cover-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .cover-placeholder .icon  { font-size: 52px; opacity: 0.5; }
  .cover-placeholder .hint { font-size: 11px; color: var(--text-quiet); font-family: var(--font-body); letter-spacing: 0.04em; }

  /* ── Info ── */
  .info-bar { text-align: center; width: 100%; }
  .set-name {
    font-family: var(--font-display);
    font-size: 24px; font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
    color: var(--text);
    animation: fadeUp 0.5s 0.1s both;
  }
  .track-name {
    font-size: 12.5px; font-weight: 400;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.02em;
    animation: fadeUp 0.5s 0.15s both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } }

  /* ── Lyrics panel ── */
  .lyrics-panel {
    width: 100%;
    max-height: 0;
    overflow: hidden;
    background: rgba(255,255,255,0.015);
    border-radius: var(--radius-md);
    border: 1px solid transparent;
    transition: max-height 0.45s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.3s ease;
  }
  .lyrics-panel.open {
    max-height: 260px;
    border-color: rgba(167,139,250,0.1);
  }
  .lyrics-inner {
    padding: 16px 18px;
    max-height: 260px;
    overflow-y: auto;
    scroll-behavior: smooth;
    font-size: 14px;
    line-height: 2.1;
    color: var(--text-dim);
    text-align: center;
    -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
    mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
  }
  .lyrics-inner .line { transition: all 0.35s ease; cursor: default; }
  .lyrics-inner .line.active {
    color: var(--accent-soft);
    font-weight: 600;
    font-size: 15px;
    text-shadow: 0 0 20px var(--accent-glow);
  }
  .lyrics-inner .line.empty { color: var(--text-quiet); font-style: italic; }
  .lyrics-btn {
    background: none; border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim); font-size: 11px; font-family: var(--font-body);
    padding: 4px 14px; border-radius: 20px; cursor: pointer;
    letter-spacing: 0.05em; transition: all 0.25s ease;
  }
  .lyrics-btn:hover { border-color: var(--accent); color: var(--accent-soft); }
  .lyrics-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(167,139,250,0.08); }

  /* ── Progress ── */
  .progress-container {
    width: 100%; display: flex; align-items: center; gap: 10px;
    animation: fadeUp 0.5s 0.2s both;
  }
  .time {
    font-family: var(--font-body); font-size: 11px;
    font-weight: 400; font-variant-numeric: tabular-nums;
    color: var(--text-quiet); min-width: 40px; letter-spacing: 0.03em;
  }
  .time.current { text-align: right; }
  .progress-bar {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; background: rgba(255,255,255,0.06);
    border-radius: 2px; cursor: pointer; outline: none;
  }
  .progress-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 12px var(--accent-glow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .progress-bar::-webkit-slider-thumb:hover { transform: scale(1.3); box-shadow: 0 0 20px var(--accent-glow); }
  .progress-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    background: var(--accent); border: none; border-radius: 50%;
    cursor: pointer; box-shadow: 0 0 12px var(--accent-glow);
  }

  /* ── Controls row ── */
  .controls-row {
    display: flex; align-items: center; gap: 28px;
    animation: fadeUp 0.5s 0.25s both;
  }
  .btn-play {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg-deep);
    border: none;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(167,139,250,0.35);
    transition: all 0.25s ease;
    position: relative;
  }
  .btn-play::after {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    border: 1.5px solid rgba(167,139,250,0.25);
    opacity: 0; transition: opacity 0.25s ease;
  }
  .btn-play:hover { transform: scale(1.06); box-shadow: 0 6px 32px rgba(167,139,250,0.5); }
  .btn-play:hover::after { opacity: 1; }
  .btn-play:active { transform: scale(0.94); }
  .btn-play:disabled { opacity: 0.25; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-play:disabled::after { display: none; }

  .btn-icon { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 6px; border-radius: 50%; transition: all 0.2s ease; }
  .btn-icon:hover { color: var(--text); background: rgba(255,255,255,0.04); }

  /* ── Bottom row: volume + loop ── */
  .bottom-row {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 18px;
    animation: fadeUp 0.5s 0.3s both;
  }
  .volume-wrap {
    display: flex; align-items: center; gap: 7px;
  }
  .volume-wrap .icon { font-size: 15px; color: var(--text-quiet); }
  .volume-slider {
    -webkit-appearance: none; appearance: none;
    width: 90px; height: 3px;
    background: rgba(255,255,255,0.06); border-radius: 2px; cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    background: var(--accent-soft); border-radius: 50%; cursor: pointer;
    transition: transform 0.15s ease;
  }
  .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .volume-slider::-moz-range-thumb {
    width: 11px; height: 11px;
    background: var(--accent-soft); border: none; border-radius: 50%; cursor: pointer;
  }

  .divider { width: 1px; height: 16px; background: rgba(255,255,255,0.06); border-radius: 1px; }

  .btn-loop {
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    padding: 5px 16px; border-radius: 20px;
    font-size: 11px; font-family: var(--font-body);
    cursor: pointer; letter-spacing: 0.04em;
    transition: all 0.25s ease;
  }
  .btn-loop:hover { border-color: var(--text-dim); }
  .btn-loop.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(167,139,250,0.08);
    box-shadow: 0 0 12px rgba(167,139,250,0.1);
  }

  /* ── Drop zone ── */
  .drop-zone {
    width: 100%; padding: 28px 16px;
    border: 2px dashed rgba(255,255,255,0.06);
    border-radius: var(--radius-lg);
    text-align: center;
    color: var(--text-quiet);
    font-size: 13px; cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.01);
    animation: fadeUp 0.5s 0.35s both;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(167,139,250,0.04);
    color: var(--text-dim);
  }
  .drop-zone.hidden { display: none; }
  .drop-zone small { font-size: 10.5px; opacity: 0.5; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: rgba(22,18,36,0.9); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: var(--text); padding: 10px 22px;
    border-radius: 24px; font-size: 12.5px;
    border: 1px solid rgba(255,255,255,0.08);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 100; font-family: var(--font-body);
  }
  .toast.show { opacity: 1; }

  .file-input-hidden { display: none; }

  /* ── Responsive ── */
  @media (max-width: 460px) {
    .player { max-width: 100%; margin: 12px; padding: 24px 16px 20px; gap: 16px; }
    .cover-wrapper { width: 220px; height: 220px; }
    .set-name { font-size: 20px; }
    .btn-play { width: 52px; height: 52px; font-size: 19px; }
    .bottom-row { gap: 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0s !important; transition-duration: 0s !important; }
  }
</style>
</head>
<body>

<div class="player">

  <!-- Cover with vinyl disc -->
  <div class="cover-wrapper">
    <div class="vinyl-disc" id="vinylDisc"></div>
    <div class="cover-area" id="coverArea" title="点击或拖放图片更换封面">
      <div class="cover-placeholder" id="coverPlaceholder">
        <span class="icon">🎵</span>
        <span class="hint">点击添加封面</span>
      </div>
      <img id="coverImg" src="" alt="Cover" style="display:none">

    <input type="file" class="file-input-hidden" id="coverFileInput" accept="image/*">
  </div>

  <!-- Info -->
  <div class="info-bar">

  </div>

  <!-- Lyrics -->
  <button class="lyrics-btn" id="lyricsBtn" style="display:none">📝 歌词</button>
  <div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-inner" id="lyricsInner"></div>
  </div>

  <!-- Progress -->
  <div class="progress-container">
    <span class="time current" id="timeCurrent">00:00</span>
    <input type="range" class="progress-bar" id="progressBar" min="0" max="100" value="0" disabled>
    <span class="time total" id="timeTotal">00:00</span>
  </div>

  <!-- Play -->
  <div class="controls-row">
    <button class="btn-play" id="btnPlay" disabled title="播放">▶</button>
  </div>

  <!-- Volume + Loop -->
  <div class="bottom-row">

      <span class="icon">🔊</span>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">

  </div>

  <div class="drop-zone" id="dropZone" title="拖放或点击导入音频">
    📁 拖放音频文件<br><small>或点击选择 · 支持 MP3 WAV OGG FLAC</small>
  </div>
  <input type="file" class="file-input-hidden" id="audioFileInput" accept="audio/*,.lrc" multiple>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
<script>
/* ============================================================
   Environment check
   ============================================================ */
if (typeof FileReader === 'undefined') {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;
      background:#08060f;color:#f0edf6;font-family:system-ui,sans-serif;">
      <div>
        <p style="font-size:32px;margin-bottom:16px;">⚠️</p>
        <p style="font-size:18px;">您的浏览器不支持此播放器</p>
        <p style="color:#8b86a0;margin-top:8px;">请使用 Chrome、Firefox、Edge 或 Safari 的最新版本</p>
      </div>
    </div>`;
  throw new Error('FileReader not available');
}

/* ============================================================
   Store — LocalStorage wrapper with graceful degradation
   ============================================================ */
const Store = (() => {
  let available = false;
  const PREFIX = 'music-player:';
  const DEFAULTS = { volume: 0.8, loop: false };

  try {
    const testKey = PREFIX + '__test';
    localStorage.setItem(testKey, '1');
    localStorage.removeItem(testKey);
    available = true;
  } catch (_) {}

  return {
    get(key) {
      if (!available) return DEFAULTS[key];
      try {
        const raw = localStorage.getItem(PREFIX + key);
        return raw !== null ? JSON.parse(raw) : DEFAULTS[key];
      } catch (_) { return DEFAULTS[key]; }
    },
    set(key, value) {
      if (!available) return;
      try { localStorage.setItem(PREFIX + key, JSON.stringify(value)); }
      catch (_) {}
    }
  };
})();

/* ============================================================
   AudioEngine — wraps <audio> element
   ============================================================ */
const AudioEngine = (() => {
  const audio = new Audio();
  const listeners = {};
  let currentFile = null;

  function on(name, fn) {
    if (!listeners[name]) listeners[name] = [];
    listeners[name].push(fn);
  }
  function emit(name, data) {
    (listeners[name] || []).forEach(fn => fn(data));
  }

  audio.addEventListener('timeupdate', () => {
    if (audio.duration && isFinite(audio.duration)) {
      emit('timeupdate', { currentTime: audio.currentTime, duration: audio.duration });
    }
  });
  audio.addEventListener('ended', () => emit('ended'));
  audio.addEventListener('loadedmetadata', () => emit('loadedmetadata', { duration: audio.duration }));
  audio.addEventListener('error', () => emit('error', { file: currentFile }));
  audio.addEventListener('play', () => emit('play'));
  audio.addEventListener('pause', () => emit('pause'));

  function load(file) {
    if (currentFile && audio.src && audio.src.startsWith('blob:')) {
      URL.revokeObjectURL(audio.src);
    }
    currentFile = file;
    audio.src = URL.createObjectURL(file);
    audio.load();
  }

  return {
    load,
    play()  { const p = audio.play(); if (p) p.catch(() => {}); },
    pause() { audio.pause(); },
    seek(seconds) { if (isFinite(seconds)) audio.currentTime = seconds; },
    setVolume(v)   { audio.volume = Math.max(0, Math.min(1, v)); },
    setLoop(bool)  { audio.loop = bool; },
    getCurrentTime() { return audio.currentTime; },
    getDuration()    { return audio.duration || 0; },
    isPaused()       { return audio.paused; },
    on,
    destroy() {
      audio.pause();
      if (audio.src && audio.src.startsWith('blob:')) URL.revokeObjectURL(audio.src);
    }
  };
})();

/* ============================================================
   Playlist — manages the audio file queue
   ============================================================ */
const Playlist = (() => {
  let files = [];
  let index = -1;
  const lrcMap = new Map(); // filename → LRC text

  function add(newFiles) {
    const arr = Array.from(newFiles);
    if (arr.length === 0) return { added: 0, skipped: 0, total: files.length };

    // Separate LRC files
    const lrcFiles = arr.filter(f => /\.lrc$/i.test(f.name));
    const audioFiles = arr.filter(f =>
      f.type.startsWith('audio/') ||
      /\.(mp3|wav|ogg|flac|m4a|aac|wma|opus|webm)$/i.test(f.name)
    );

    // Read LRC files
    lrcFiles.forEach(f => {
      const reader = new FileReader();
      reader.onload = () => { lrcMap.set(f.name.replace(/\.lrc$/i, ''), reader.result); };
      reader.readAsText(f);
    });

    const skipped = arr.length - audioFiles.length - lrcFiles.length;
    files.push(...audioFiles);
    if (index === -1 && files.length > 0) index = 0;
    return { added: audioFiles.length, skipped, total: files.length };
  }

  function remove(i) {
    if (i < 0 || i >= files.length) return null;
    const removed = files.splice(i, 1)[0];
    if (files.length === 0) { index = -1; }
    else if (index >= files.length) { index = files.length - 1; }
    else if (i < index) { index--; }
    return removed;
  }

  function current()        { return index >= 0 ? files[index] : null; }
  function getIndex()       { return index; }
  function count()          { return files.length; }
  function all()            { return files.slice(); }
  function next() {
    if (files.length === 0) return null;
    index = (index + 1) % files.length;
    return files[index];
  }
  function getLrcFor(file) {
    if (!file) return null;
    const base = file.name.replace(/\.(mp3|wav|ogg|flac|m4a|aac|wma|opus|webm)$/i, '');
    return lrcMap.get(base) || lrcMap.get(file.name) || null;
  }
  function setLrc(filename, text) { lrcMap.set(filename, text); }

  return { add, remove, current, next, getIndex, count, all, getLrcFor, setLrc };
})();

/* ============================================================
   CoverManager — handles cover image loading via FileReader
   ============================================================ */
const CoverManager = (() => {
  let currentDataURL = null;
  const listeners = {};

  function on(name, fn) {
    if (!listeners[name]) listeners[name] = [];
    listeners[name].push(fn);
  }
  function emit(name, data) {
    (listeners[name] || []).forEach(fn => fn(data));
  }

  function setFromFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      emit('error', { message: '不是有效的图片文件' });
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      currentDataURL = reader.result;
      emit('change', { dataURL: currentDataURL });
    };
    reader.onerror = () => emit('error', { message: '图片读取失败' });
    reader.readAsDataURL(file);
  }

  function getCurrent() { return currentDataURL; }
  return { setFromFile, getCurrent, on };
})();

/* ============================================================
   Lyrics — parse LRC, read ID3 tags, sync with audio
   ============================================================ */
const Lyrics = (() => {
  let parsed = [];         // [{time: seconds, text: string}]
  let hasTimestamps = false;
  let rawText = '';
  const listeners = {};

  function on(name, fn) {
    if (!listeners[name]) listeners[name] = [];
    listeners[name].push(fn);
  }
  function emit(name, data) { (listeners[name] || []).forEach(fn => fn(data)); }

  function parseLRC(lrcText) {
    const lines = [];
    const re = /^\[(\d{2}):(\d{2})(?:[.:](\d{2,3}))?\](.*)$/;
    for (const raw of lrcText.split(/\r?\n/)) {
      const m = raw.match(re);
      if (m) {
        const mins = parseInt(m[1]), secs = parseInt(m[2]);
        let ms = m[3] ? parseInt(m[3]) : 0;
        if (ms < 100) ms *= 10; // .xx → milliseconds
        const time = mins * 60 + secs + ms / 1000;
        const text = m[4].trim();
        lines.push({ time, text });
      } else {
        const t = raw.trim();
        if (t && !t.startsWith('[')) lines.push({ time: -1, text: t });
      }
    }
    parsed = lines;
    hasTimestamps = lines.length > 0 && lines.some(l => l.time >= 0);
    rawText = lrcText;
    emit('change', { lines: parsed, hasTimestamps });
  }

  function setPlain(text) {
    const lines = text.split(/\r?\n/).filter(t => t.trim()).map(t => ({ time: -1, text: t.trim() }));
    parsed = lines;
    hasTimestamps = false;
    rawText = text;
    emit('change', { lines: parsed, hasTimestamps: false });
  }

  function getActiveLine(currentTime) {
    if (!hasTimestamps || parsed.length === 0) return -1;
    let active = -1;
    for (let i = 0; i < parsed.length; i++) {
      if (parsed[i].time >= 0 && parsed[i].time <= currentTime) active = i;
    }
    return active;
  }

  async function tryExtractFromAudio(file) {
    if (typeof jsmediatags === 'undefined') return false;
    return new Promise(resolve => {
      jsmediatags.read(file, {
        onSuccess: (tag) => {
          const tags = tag.tags;
          // USLT = unsynchronized lyrics, SYLT = synchronized
          let found = false;
          if (tags.lyrics) {
            // Some players store lyrics in the lyrics field
            if (typeof tags.lyrics === 'string') { setPlain(tags.lyrics); found = true; }
            else if (tags.lyrics.lyrics) { setPlain(tags.lyrics.lyrics); found = true; }
          }
          if (!found && tags.unsynchronisedLyrics) {
            if (typeof tags.unsynchronisedLyrics === 'string') { setPlain(tags.unsynchronisedLyrics); found = true; }
            else if (tags.unsynchronisedLyrics.lyrics) { setPlain(tags.unsynchronisedLyrics.lyrics); found = true; }
          }
          resolve(found);
        },
        onError: () => resolve(false)
      });
    });
  }

  function clear() { parsed = []; hasTimestamps = false; rawText = ''; emit('change', { lines: [], hasTimestamps: false }); }
  function isEmpty() { return parsed.length === 0; }
  function getLines() { return parsed; }

  return { parseLRC, setPlain, getActiveLine, tryExtractFromAudio, clear, isEmpty, getLines, on };
})();


/* ============================================================
   UI — DOM bindings, event handlers, module orchestration
   ============================================================ */
(function UI() {
  /* --- DOM refs --- */
  const coverArea    = document.getElementById('coverArea');
  const coverPlaceholder = document.getElementById('coverPlaceholder');
  const coverImg     = document.getElementById('coverImg');
  const coverFileInput = document.getElementById('coverFileInput');
  const vinylDisc    = document.getElementById('vinylDisc');
  const setName      = document.getElementById('setName');
  const trackName    = document.getElementById('trackName');
  const lyricsBtn    = document.getElementById('lyricsBtn');
  const lyricsPanel  = document.getElementById('lyricsPanel');
  const lyricsInner  = document.getElementById('lyricsInner');
  const progressBar  = document.getElementById('progressBar');
  const timeCurrent  = document.getElementById('timeCurrent');
  const timeTotal    = document.getElementById('timeTotal');
  const btnPlay      = document.getElementById('btnPlay');
  const volumeSlider = document.getElementById('volumeSlider');
  const btnLoop      = document.getElementById('btnLoop');
  const dropZone     = document.getElementById('dropZone');
  const audioFileInput = document.getElementById('audioFileInput');
  const toast        = document.getElementById('toast');

  let toastTimer = null;
  let isSeeking = false;
  let lyricsVisible = false;

  /* --- Helpers --- */
  function fmtTime(s) {
    if (!isFinite(s) || s < 0) return '00:00';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  }
  function showToast(msg) {
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }
  function updateTrackDisplay() {
    const f = Playlist.current();
    trackName.textContent = f
      ? `曲目 ${Playlist.getIndex()+1}/${Playlist.count()}  ·  ${f.name}`
      : '尚无曲目';
    setName.textContent = Playlist.count() > 0 ? `音乐集 · ${Playlist.count()} 首` : '拖放音频到下方';
  }
  function updatePlayButton() {
    if (Playlist.count() === 0) { btnPlay.disabled = true; btnPlay.textContent = '▶'; return; }
    btnPlay.disabled = false;
    btnPlay.textContent = AudioEngine.isPaused() ? '▶' : '⏸';
    if (!AudioEngine.isPaused()) coverArea.classList.add('playing');
    else coverArea.classList.remove('playing');
  }

  /* --- Vinyl + cover animation --- */
  function setVinylState(playing, hasCover) {
    vinylDisc.classList.toggle('visible', hasCover);
    if (hasCover && playing) vinylDisc.classList.add('spinning');
    else vinylDisc.classList.remove('spinning');
  }
  AudioEngine.on('play', () => {
    setVinylState(true, CoverManager.getCurrent() !== null);
    coverArea.classList.add('playing');
    btnPlay.textContent = '⏸';
  });
  AudioEngine.on('pause', () => {
    setVinylState(false, CoverManager.getCurrent() !== null);
    coverArea.classList.remove('playing');
    btnPlay.textContent = '▶';
  });

  /* --- Restore settings --- */
  const savedVolume = Store.get('volume');
  const savedLoop = Store.get('loop');
  AudioEngine.setVolume(savedVolume);
  volumeSlider.value = Math.round(savedVolume * 100);

  let loopActive = savedLoop;
  AudioEngine.setLoop(loopActive);
  btnLoop.classList.toggle('active', loopActive);
  btnLoop.textContent = loopActive ? '🔄 开' : '🔄 关';

  /* --- Cover events --- */
  coverArea.addEventListener('click', () => coverFileInput.click());
  coverArea.addEventListener('dragover', e => { e.preventDefault(); coverArea.classList.add('drag-over'); });
  coverArea.addEventListener('dragleave', () => coverArea.classList.remove('drag-over'));
  coverArea.addEventListener('drop', e => {
    e.preventDefault(); coverArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) CoverManager.setFromFile(file);
  });
  coverFileInput.addEventListener('change', () => {
    const file = coverFileInput.files[0];
    if (file) CoverManager.setFromFile(file);
    coverFileInput.value = '';
  });

  CoverManager.on('change', ({ dataURL }) => {
    coverImg.src = dataURL; coverImg.style.display = 'block';
    coverPlaceholder.style.display = 'none';
    vinylDisc.classList.add('visible');
    if (!AudioEngine.isPaused()) vinylDisc.classList.add('spinning');
  });
  CoverManager.on('error', ({ message }) => showToast(message));

  /* --- Audio import --- */
  function importAudioFiles(fileList) {
    if (!fileList || fileList.length === 0) return;
    const result = Playlist.add(fileList);
    if (result.added === 0) {
      showToast('未识别到支持的音频格式 (MP3, WAV, OGG, FLAC 等)');
      return;
    }
    if (result.skipped > 0) showToast(`已添加 ${result.added} 首，跳过 ${result.skipped} 个非音频文件`);
    if (result.added > 0 && result.total === result.added) { loadCurrentTrack(); }
    updateTrackDisplay();
    updatePlayButton();
    dropZone.classList.toggle('hidden', Playlist.count() > 0);
  }

  async function loadCurrentTrack() {
    const file = Playlist.current();
    if (!file) return;
    AudioEngine.load(file);
    updateTrackDisplay();
    updatePlayButton();

    // Try lyrics: LRC match first, then embedded ID3, then clear
    Lyrics.clear();
    lyricsBtn.style.display = 'none';
    lyricsPanel.classList.remove('open');
    lyricsVisible = false;

    const lrc = Playlist.getLrcFor(file);
    if (lrc) {
      Lyrics.parseLRC(lrc);
      showLyrics();
    } else if (typeof jsmediatags !== 'undefined') {
      const found = await Lyrics.tryExtractFromAudio(file);
      if (found) showLyrics();
    }
    renderLyrics();
  }

  function showLyrics() {
    if (Lyrics.isEmpty()) return;
    lyricsBtn.style.display = 'inline-block';
  }

  function renderLyrics(activeIdx = -1) {
    const lines = Lyrics.getLines();
    if (lines.length === 0) { lyricsInner.innerHTML = ''; return; }
    lyricsInner.innerHTML = lines.map((l, i) => {
      let cls = 'line';
      if (i === activeIdx) cls += ' active';
      if (!l.text) cls += ' empty';
      return `<div class="${cls}">${l.text || '♫'}</div>`;
    }).join('');
    // Scroll active line into view
    if (activeIdx >= 0) {
      const el = lyricsInner.children[activeIdx];
      if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  /* --- Lyrics toggle --- */
  lyricsBtn.addEventListener('click', () => {
    lyricsVisible = !lyricsVisible;
    lyricsPanel.classList.toggle('open', lyricsVisible);
    lyricsBtn.classList.toggle('active', lyricsVisible);
    renderLyrics();
  });

  /* --- Drop zone events --- */
  dropZone.addEventListener('click', () => audioFileInput.click());
  let dzCounter = 0;
  dropZone.addEventListener('dragenter', e => { e.preventDefault(); dzCounter++; dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => { dzCounter--; if (dzCounter === 0) dropZone.classList.remove('drag-over'); });
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    dzCounter = 0; dropZone.classList.remove('drag-over');
    importAudioFiles(e.dataTransfer.files);
  });
  audioFileInput.addEventListener('change', () => {
    importAudioFiles(audioFileInput.files);
    audioFileInput.value = '';
  });

  /* --- Play/Pause --- */
  btnPlay.addEventListener('click', () => {
    if (Playlist.count() === 0) return;
    if (AudioEngine.isPaused()) AudioEngine.play();
    else AudioEngine.pause();
    updatePlayButton();
  });

  /* --- Progress --- */
  progressBar.addEventListener('input', () => {
    isSeeking = true;
    const dur = AudioEngine.getDuration();
    if (dur > 0) timeCurrent.textContent = fmtTime((progressBar.value / 100) * dur);
  });
  progressBar.addEventListener('change', () => {
    const dur = AudioEngine.getDuration();
    if (dur > 0) AudioEngine.seek((progressBar.value / 100) * dur);
    isSeeking = false;
  });

  AudioEngine.on('timeupdate', ({ currentTime, duration }) => {
    if (!isSeeking && duration > 0) {
      progressBar.value = (currentTime / duration) * 100;
      timeCurrent.textContent = fmtTime(currentTime);
      // Sync lyrics
      if (lyricsVisible) {
        const idx = Lyrics.getActiveLine(currentTime);
        renderLyrics(idx);
      }
    }
  });

  AudioEngine.on('loadedmetadata', ({ duration }) => {
    progressBar.disabled = false; progressBar.value = 0;
    timeTotal.textContent = fmtTime(duration); timeCurrent.textContent = '00:00';
    updatePlayButton();
  });

  /* --- Track ended → next --- */
  let consecutiveErrors = 0;
  AudioEngine.on('ended', () => {
    consecutiveErrors = 0;
    Playlist.next();
    loadCurrentTrack();
    AudioEngine.play();
  });

  AudioEngine.on('loadedmetadata', () => { consecutiveErrors = 0; });

  AudioEngine.on('error', ({ file }) => {
    consecutiveErrors++;
    if (consecutiveErrors >= Playlist.count()) {
      showToast('所有曲目均无法播放'); consecutiveErrors = 0; return;
    }
    showToast(`播放出错: ${file ? file.name : '未知文件'}`);
    Playlist.next(); loadCurrentTrack(); AudioEngine.play();
  });

  /* --- Volume --- */
  volumeSlider.addEventListener('input', () => {
    const v = volumeSlider.value / 100;
    AudioEngine.setVolume(v); Store.set('volume', v);
  });

  /* --- Loop --- */
  btnLoop.addEventListener('click', () => {
    loopActive = !loopActive;
    AudioEngine.setLoop(loopActive); Store.set('loop', loopActive);
    btnLoop.classList.toggle('active', loopActive);
    btnLoop.textContent = loopActive ? '🔄 开' : '🔄 关';
  });

  /* --- Global drag-and-drop --- */
  document.addEventListener('dragover', e => { e.preventDefault(); });
  document.addEventListener('drop', e => {
    e.preventDefault();
    if (coverArea.contains(e.target)) return;
    const files = e.dataTransfer.files;
    if (files.length > 0) importAudioFiles(files);
  });
})();
</script>

</body>
</html>
